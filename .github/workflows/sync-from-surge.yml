name: Sync from Surge

on:
  schedule:
    - cron: '0 * * * *' # 每60分钟运行一次
  workflow_dispatch: # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Shadowrocket
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone Surge Repository
        run: |
          git clone --depth=1 -b Surge https://github.com/USNOCTURNE90/Surge.git surge_temp

      - name: Sync Content
        run: |
          rsync -av --delete --exclude='.git' --exclude='.github' surge_temp/ ./ || [ $? -eq 24 ]
          rm -rf surge_temp

      - name: Commit and Push Changes
        run: |
          git config --local user.name "GitHub Action"
          git config --local user.email "action@github.com"
          git add .
          git diff --staged --quiet || git commit -m "Sync content from Surge"
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/USNOCTURNE90/Shadowrocket.git